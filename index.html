<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic AI - v1201 Intelligent</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --dark: #0f172a; --slate: #64748b; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        
        nav { background: var(--dark); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .update-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }

        .content { padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { border: 1px solid #f1f5f9; padding: 20px; border-radius: 16px; background: #fff; }
        h3 { margin: 0 0 15px 0; font-size: 16px; color: var(--primary); border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        
        .input-item { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--slate); margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }

        .btn-analyze { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 25px; }
        
        #aiResult { margin-top: 30px; display: none; padding: 20px; border-radius: 16px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .terminal { background: #0f172a; color: #38bdf8; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 13px; line-height: 1.6; margin-top: 15px; }

        #updateOverlay { position: fixed; inset: 0; background: rgba(15,23,42,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        .progress-box { width: 300px; height: 8px; background: #334155; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <strong>ACADEMIC AI <span style="opacity:0.6; font-weight:normal">v1201.intel</span></strong>
        <button class="update-btn" onclick="document.getElementById('fileIn').click()">CẬP NHẬT THẲNG</button>
        <input type="file" id="fileIn" hidden accept=".html">
    </nav>

    <div class="content">
        <div class="grid">
            <div class="card">
                <h3>📊 Khối Khoa Học</h3>
                <div class="input-item"><label>Toán học</label><input type="number" class="sc" step="0.1" data-n="Toán"></div>
                <div class="input-item"><label>Vật lí</label><input type="number" class="sc" step="0.1" data-n="Vật lí"></div>
                <div class="input-item"><label>Hóa học</label><input type="number" class="sc" step="0.1" data-n="Hóa học"></div>
                <div class="input-item"><label>Tin học</label><input type="number" class="sc" step="0.1" data-n="Tin học"></div>
            </div>
            <div class="card">
                <h3>📜 Khối Xã Hội</h3>
                <div class="input-item"><label>Ngữ văn</label><input type="number" class="sc" step="0.1" data-n="Ngữ văn"></div>
                <div class="input-item"><label>Ngoại ngữ</label><input type="number" class="sc" step="0.1" data-n="Ngoại ngữ"></div>
                <div class="input-item"><label>Lịch sử</label><input type="number" class="sc" step="0.1" data-n="Lịch sử"></div>
                <div class="input-item"><label>Địa lí</label><input type="number" class="sc" step="0.1" data-n="Địa lí"></div>
                <div class="input-item"><label>GDQP & AN</label><input type="number" class="sc" step="0.1" data-n="GDQP"></div>
            </div>
            <div class="card" style="background: #fdfdfd">
                <h3>✅ Nhận Xét</h3>
                <div class="input-item"><label>Thể dục</label><select class="nx"><option>Đạt</option><option>Chưa đạt</option></select></div>
                <div class="input-item"><label>Trải nghiệm</label><select class="nx"><option>Đạt</option><option>Chưa đạt</option></select></div>
                <div class="input-item"><label>GD địa phương</label><select class="nx"><option>Đạt</option><option>Chưa đạt</option></select></div>
            </div>
        </div>

        <button class="btn-analyze" onclick="runIntelligentAI()">PHÂN TÍCH HỆ THỐNG</button>

        <div id="aiResult">
            <div style="text-align: center;">
                <div style="font-size: 14px; color: var(--slate);">GPA 9 MÔN CỦA BẠN</div>
                <div id="gpaLarge" style="font-size: 48px; font-weight: 900; color: var(--dark);">0.0</div>
                <div id="rankBadge" style="display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px;">---</div>
            </div>
            <div class="terminal" id="terminalLog"></div>
        </div>
    </div>
</div>

<div id="updateOverlay">
    <h3>UPLOADING CORE PATCH...</h3>
    <div class="progress-box"><div class="progress-bar" id="pBar"></div></div>
    <div id="pText">0%</div>
</div>

<script>
    function runIntelligentAI() {
        const inputs = document.querySelectorAll('.sc');
        const nx = document.querySelectorAll('.nx');
        let scores = [], subjects = [];

        for(let i of inputs) {
            if(i.value === "") { alert("AI cần đủ 9 môn để xử lý dữ liệu!"); return; }
            let val = parseFloat(i.value);
            scores.push(val);
            subjects.push({ name: i.getAttribute('data-n'), val: val });
        }
        let checks = Array.from(nx).map(v => v.value);

        // --- BỘ NÃO VIETSCHOOL (THÔNG TƯ 22) ---
        const evaluate = (sArr, cArr) => {
            const allPass = cArr.every(c => c === "Đạt");
            const min = Math.min(...sArr);
            const count8 = sArr.filter(s => s >= 8.0).length;
            const count65 = sArr.filter(s => s >= 6.5).length;
            const count5 = sArr.filter(s => s >= 5.0).length;

            if (allPass && min >= 6.5 && count8 >= 6) return 4; // Tốt
            if (allPass && min >= 5.0 && count65 >= 6) return 3; // Khá
            if (cArr.filter(c => c === "Đạt").length >= 2 && min >= 3.5 && count5 >= 6) return 2; // Đạt
            return 1;
        };

        let gpa = (scores.reduce((a,b) => a+b, 0) / 9).toFixed(2);
        let rawRank = evaluate(scores, checks);
        let finalRank = rawRank;
        let isAdjusted = false;
        let focusSubject = "";

        // Thuật toán điều chỉnh AI (Nâng mức khống chế 1 môn)
        if(rawRank < 4) {
            for(let i=0; i<scores.length; i++) {
                let temp = [...scores]; temp[i] = 10;
                if(evaluate(temp, checks) > rawRank) {
                    finalRank = rawRank + 1;
                    isAdjusted = true;
                    focusSubject = subjects[i].name;
                    break;
                }
            }
        }

        // Hiển thị kết quả
        const labels = ["", "CHƯA ĐẠT", "ĐẠT", "KHÁ", "TỐT"];
        const colors = ["", "#94a3b8", "#10b981", "#f59e0b", "#2563eb"];

        document.getElementById('aiResult').style.display = 'block';
        document.getElementById('gpaLarge').innerText = gpa;
        const badge = document.getElementById('rankBadge');
        badge.innerText = labels[finalRank];
        badge.style.background = colors[finalRank] + "20";
        badge.style.color = colors[finalRank];

        // Terminal Log phân tích kiểu Vietschool
        let log = `[System Analysis Log]<br>`;
        log += `> Kết nối máy chủ Vietschool Core... Thành công.<br>`;
        log += `> GPA: ${gpa} | Mục tiêu 8.1: ${gpa >= 8.1 ? 'XÁC NHẬN ĐẠT ✅' : 'CHƯA ĐẠT ('+(8.1-gpa).toFixed(2)+'pts)'}<br>`;
        if(isAdjusted) {
            log += `> AI Detection: Môn ${focusSubject} đang gây khống chế. Áp dụng TT22 nâng mức thành công.<br>`;
        }
        log += `> Xếp loại cuối cùng: ${labels[finalRank]}.<br>`;
        log += `> Trạng thái: Dữ liệu đã được tích hợp thông minh.`;
        document.getElementById('terminalLog').innerHTML = log;
    }

    // NÚT CẬP NHẬT THẲNG
    document.getElementById('fileIn').addEventListener('change', function(e) {
        let file = e.target.files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('updateOverlay').style.display = 'flex';
            let p = 0;
            let itv = setInterval(() => {
                p += 4;
                document.getElementById('pBar').style.width = p + '%';
                document.getElementById('pText').innerText = p + '%';
                if(p >= 100) {
                    clearInterval(itv);
                    document.open(); document.write(ev.target.result); document.close();
                }
            }, 40);
        };
        reader.readAsText(file);
    });
</script>
</body>
</html>
